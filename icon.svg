<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ef4444"/>
      <stop offset="1" stop-color="#991b1b"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="128" height="128" rx="28" fill="url(#bg)"/>

  <!-- wheels (dark) -->
  <g fill="#111827">
    <rect x="38" y="34" width="13" height="22" rx="4"/>
    <rect x="77" y="34" width="13" height="22" rx="4"/>
    <rect x="34" y="70" width="15" height="26" rx="4"/>
    <rect x="79" y="70" width="15" height="26" rx="4"/>
  </g>

  <!-- car body (white) -->
  <g fill="#ffffff">
    <polygon points="64,12 71,32 57,32"/>
    <rect x="56" y="28" width="16" height="78" rx="8"/>
    <rect x="42" y="20" width="44" height="8" rx="3"/>
    <rect x="36" y="100" width="56" height="11" rx="3"/>
    <rect x="48" y="60" width="32" height="18" rx="6"/>
  </g>

  <!-- cockpit + halo -->
  <circle cx="64" cy="52" r="8" fill="#111827"/>
  <circle cx="64" cy="52" r="3.4" fill="#ffffff"/>
</svg>
